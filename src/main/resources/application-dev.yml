server:
  port: 40000

spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3456/arcticFox?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

    hikari:
      pool-name: HikariPool-Dev
      maximum-pool-size: 10
      minimum-idle: 1
      leak-detection-threshold: 60000
      connection-timeout: 3000     # 3s  → 3,000 ms
      max-lifetime: 1800000        # 30m → 1,800,000 ms
      idle-timeout: 300000         # 5m  →   300,000 ms

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        show_sql: true
        jdbc.time_zone: Asia/Seoul
        generate_statistics: false
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 300
    open-in-view: false
